<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes — Agenda Tutorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-top navbar-top-admin" aria-label="Panel de administración">
  <div class="navbar-left">
    <a th:href="@{/admin/dashboard}" class="navbar-brand" aria-label="Inicio admin">
      <img th:src="@{/img/logo.png}" alt="Comfenalco" onerror="this.style.display='none'">
      <span class="brand-role-tag">Admin</span>
    </a>
    <div class="navbar-sep-v"></div>
    <nav class="navbar-nav-links">
      <a th:href="@{/admin/dashboard}" class="nav-link">Dashboard</a>
      <a th:href="@{/admin/usuarios}" class="nav-link">
        <i class="bi bi-people" aria-hidden="true"></i> Usuarios
      </a>
      <a th:href="@{/admin/tutorias}" class="nav-link">
        <i class="bi bi-calendar3" aria-hidden="true"></i> Tutorías
      </a>
      <a th:href="@{/admin/retiros}" class="nav-link">
        <i class="bi bi-cash-coin" aria-hidden="true"></i> Retiros
      </a>
      <a th:href="@{/admin/solicitudes-tutor}" class="nav-link">
        <i class="bi bi-person-check" aria-hidden="true"></i> Solicitudes
        <span th:if="${solicitudesPendientes > 0}"
              class="nav-link-badge"
              th:text="${solicitudesPendientes}"></span>
      </a>
    </nav>
  </div>
  <div class="navbar-right">
    <a th:href="@{/logout}" class="btn-nav-danger-sm">
      <i class="bi bi-box-arrow-right" aria-hidden="true"></i> Salir
    </a>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="mb-4">
        <h2 style="font-family:'Merriweather',serif; color:var(--azul); font-size:1.5rem;">
            <i class="bi bi-person-check me-2"></i>Solicitudes para ser tutor
        </h2>
        <p style="color:#7f8c8d; margin:0;">Revisa y aprueba las solicitudes pendientes</p>
    </div>

    <div th:if="${#lists.isEmpty(solicitudes)}" class="empty-state">
        <i class="bi bi-inbox"></i>
        <p>No hay solicitudes pendientes por revisar</p>
    </div>

    <div class="row g-4" th:unless="${#lists.isEmpty(solicitudes)}">
        <div class="col-md-6" th:each="s : ${solicitudes}">
            <div class="card-institucional">
                <div class="p-4">
                    <div style="display:flex; align-items:center; gap:14px; margin-bottom:16px;">
                        <div style="width:52px;height:52px;border-radius:50%;background:var(--azul);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:white;flex-shrink:0;">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div>
                            <h5 style="margin:0; color:var(--azul); font-weight:700;" th:text="${s.nombre}"></h5>
                            <p style="margin:0; color:#7f8c8d; font-size:0.88rem;" th:text="${s.correo}"></p>
                        </div>
                        <span class="badge-estado badge-pendiente ms-auto">Pendiente</span>
                    </div>

                    <div style="background:#f8f9fa; border-radius:10px; padding:14px; margin-bottom:16px;">
                        <p style="font-size:0.82rem; font-weight:600; color:#7f8c8d; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;">Motivación</p>
                        <p style="font-size:0.92rem; color:var(--texto); margin:0;" th:text="${s.motivacionTutor}"></p>
                    </div>

                    <div style="display:flex; gap:10px;">
                        <form th:action="@{/admin/solicitudes-tutor/{id}/aprobar(id=${s.id})}"
                              method="post" style="flex:1;">
                            <button class="btn-primario w-100 justify-content-center">
                                <i class="bi bi-check-lg"></i>Aprobar
                            </button>
                        </form>
                        <form th:action="@{/admin/solicitudes-tutor/{id}/rechazar(id=${s.id})}"
                              method="post" style="flex:1;">
                            <button style="width:100%;background:#fdecea;color:var(--rojo);border:none;border-radius:var(--radio);padding:11px;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
                                <i class="bi bi-x-lg"></i>Rechazar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- Paginación -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-center gap-2 mt-4">
            <a th:if="${currentPage > 0}"
               th:href="@{/admin/solicitudes-tutor(page=${currentPage - 1})}"
               class="btn-primario" style="padding:6px 16px;font-size:0.82rem;">
                <i class="bi bi-chevron-left"></i> Anterior
            </a>
            <span style="font-size:0.85rem;color:#7f8c8d;">
                Página <strong style="color:var(--azul);" th:text="${currentPage + 1}"></strong>
                de <strong th:text="${totalPages}"></strong>
            </span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/admin/solicitudes-tutor(page=${currentPage + 1})}"
               class="btn-primario" style="padding:6px 16px;font-size:0.82rem;">
                Siguiente <i class="bi bi-chevron-right"></i>
            </a>
        </div>
    </div>
</div>
</body>
</html>
