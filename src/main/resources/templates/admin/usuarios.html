<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Agenda Tutorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-top navbar-top-admin" aria-label="Panel de administración">
  <div class="navbar-left">
    <a th:href="@{/admin/dashboard}" class="navbar-brand" aria-label="Inicio admin">
      <img th:src="@{/img/logo.png}" alt="Comfenalco" onerror="this.style.display='none'">
      <span class="brand-role-tag">Admin</span>
    </a>
    <div class="navbar-sep-v"></div>
    <nav class="navbar-nav-links">
      <a th:href="@{/admin/dashboard}" class="nav-link">Dashboard</a>
      <a th:href="@{/admin/usuarios}" class="nav-link">
        <i class="bi bi-people" aria-hidden="true"></i> Usuarios
      </a>
      <a th:href="@{/admin/tutorias}" class="nav-link">
        <i class="bi bi-calendar3" aria-hidden="true"></i> Tutorías
      </a>
      <a th:href="@{/admin/retiros}" class="nav-link">
        <i class="bi bi-cash-coin" aria-hidden="true"></i> Retiros
      </a>
      <a th:href="@{/admin/solicitudes-tutor}" class="nav-link">
        <i class="bi bi-person-check" aria-hidden="true"></i> Solicitudes
        <span th:if="${solicitudesPendientes > 0}"
              class="nav-link-badge"
              th:text="${solicitudesPendientes}"></span>
      </a>
    </nav>
  </div>
  <div class="navbar-right">
    <a th:href="@{/logout}" class="btn-nav-danger-sm">
      <i class="bi bi-box-arrow-right" aria-hidden="true"></i> Salir
    </a>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="mb-4">
        <h2 style="font-family:'Merriweather',serif; color:var(--azul); font-size:1.5rem;">
            <i class="bi bi-people me-2"></i>Gestión de usuarios
        </h2>
        <p style="color:#7f8c8d; margin:0;" th:text="${usuarios.size()} + ' usuarios (pág ' + ${currentPage + 1} + ' de ' + ${totalPages} + ')'"></p>
    </div>

    <div class="card-institucional">
        <div class="card-header-azul">
            <i class="bi bi-table me-2"></i>Todos los usuarios
        </div>
        <table class="tabla-institucional">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado solicitud</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div style="width:38px;height:38px;border-radius:50%;background:var(--azul);display:flex;align-items:center;justify-content:center;color:white;font-size:0.9rem;flex-shrink:0;">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <span th:text="${u.nombre}"></span>
                        </div>
                    </td>
                    <td th:text="${u.correo}"></td>
                    <td>
                        <span class="badge-estado"
                              th:classappend="${u.rol == 'ADMIN'    ? 'badge-aceptada' :
                                               u.rol == 'PROFESOR' ? 'badge-pendiente' : 'badge-cancelada'}"
                              th:text="${u.rol}">
                        </span>
                    </td>
                    <td th:text="${u.estadoSolicitudTutor ?: '—'}"></td>
                    <td>
                        <form th:action="@{/admin/usuarios/{id}/eliminar(id=${u.id})}"
                              method="post"
                              onsubmit="return confirm('¿Eliminar a ' + /*[[${u.nombre}]]*/ '' + '?')">
                            <button style="background:#fdecea;color:var(--rojo);border:none;border-radius:8px;padding:7px 14px;font-size:0.82rem;cursor:pointer;font-weight:600;">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <!-- Paginación -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-center gap-2 p-3">
            <a th:if="${currentPage > 0}"
               th:href="@{/admin/usuarios(page=${currentPage - 1})}"
               class="btn-primario" style="padding:6px 16px;font-size:0.82rem;">
                <i class="bi bi-chevron-left"></i> Anterior
            </a>
            <span style="font-size:0.85rem;color:#7f8c8d;">
                Página <strong style="color:var(--azul);" th:text="${currentPage + 1}"></strong>
                de <strong th:text="${totalPages}"></strong>
            </span>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/admin/usuarios(page=${currentPage + 1})}"
               class="btn-primario" style="padding:6px 16px;font-size:0.82rem;">
                Siguiente <i class="bi bi-chevron-right"></i>
            </a>
        </div>
    </div>
</div>
</body>
</html>
