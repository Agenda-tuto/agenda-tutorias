<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tutor.nombre} + ' — Agenda Tutorías'">Perfil Tutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>

    <nav class="navbar-top" aria-label="Navegación principal">
  <div class="navbar-left">
    <a th:href="@{/estudiante/dashboard}" class="navbar-brand" aria-label="Inicio">
      <img th:src="@{/img/logo.png}" alt="Comfenalco" onerror="this.style.display='none'">
    </a>
    <div class="navbar-sep-v"></div>
    <nav class="navbar-nav-links" aria-label="Secciones">
      <a th:href="@{/estudiante/dashboard}" class="nav-link">Inicio</a>
      <a th:href="@{/estudiante/tutores}" class="nav-link">
        <i class="bi bi-search" aria-hidden="true"></i> Buscar tutor
      </a>
    </nav>
  </div>
  <div class="navbar-right">
    <div class="mode-pill" role="group" aria-label="Cambiar modo">
      <a th:href="@{/estudiante/dashboard}" class="mode-pill-btn active" aria-current="page">
        <i class="bi bi-mortarboard" aria-hidden="true"></i> Estudiante
      </a>
      <a th:href="@{/profesor/dashboard}" class="mode-pill-btn">
        <i class="bi bi-person-workspace" aria-hidden="true"></i> Tutor
      </a>
    </div>
    <a th:href="@{/estudiante/billetera}" class="navbar-util-btn" aria-label="Mi billetera">
      <i class="bi bi-wallet2" aria-hidden="true"></i>
      <span th:text="'$' + ${#numbers.formatDecimal(usuario.balance ?: 0, 0, 'COMMA', 0, 'POINT')}">$0</span>
    </a>
    <a th:href="@{/notificaciones}" class="navbar-util-btn navbar-bell" aria-label="Notificaciones">
      <i class="bi bi-bell" aria-hidden="true"></i>
      <span th:if="${noLeidas > 0}" class="bell-badge" th:text="${noLeidas}" aria-label="sin leer"></span>
    </a>
    <div class="navbar-profile-menu">
      <button class="profile-trigger" id="profileBtn"
              aria-haspopup="true" aria-expanded="false" aria-controls="profileDropdown">
        <div class="profile-avatar">
          <span th:text="${#strings.substring(usuario.nombre, 0, 1)}">U</span>
        </div>
        <span class="profile-name" th:text="${#strings.abbreviate(usuario.nombre, 14)}">Usuario</span>
        <i class="bi bi-chevron-down profile-chevron" aria-hidden="true"></i>
      </button>
      <div class="profile-dropdown" id="profileDropdown" role="menu">
        <a th:href="@{/estudiante/perfil}" class="dropdown-item" role="menuitem">
          <i class="bi bi-person" aria-hidden="true"></i> Mi perfil
        </a>
        <a th:href="@{/estudiante/solicitar-tutor}" class="dropdown-item" role="menuitem">
          <i class="bi bi-person-check" aria-hidden="true"></i> Ser tutor
        </a>
        <div class="dropdown-divider"></div>
        <a th:href="@{/logout}" class="dropdown-item dropdown-item-danger" role="menuitem">
          <i class="bi bi-box-arrow-right" aria-hidden="true"></i> Cerrar sesión
        </a>
      </div>
    </div>
  </div>
</nav>

    <div class="container py-5">
        <div class="row g-4 justify-content-center">

            <!-- Columna izquierda: perfil -->
            <div class="col-md-4">
                <div class="card-institucional" style="text-align:center; padding:32px;">
                    <div style="width:100px; height:100px; border-radius:50%;
                            background:linear-gradient(135deg,var(--azul),var(--azul-medio));
                            display:flex; align-items:center; justify-content:center;
                            font-size:2.8rem; color:white; margin:0 auto 20px;">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <h3 style="font-family:'Merriweather',serif; color:var(--azul); margin-bottom:6px;"
                        th:text="${tutor.nombre}"></h3>
                    <p style="color:var(--rojo); font-weight:600; margin-bottom:16px;"
                        th:text="${tutor.especialidad ?: 'Tutor'}"></p>

                    <!-- Rating -->
                    <div class="estrellas" style="font-size:1.1rem; margin-bottom:8px;">
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-half"></i>
                    </div>
                    <p style="color:#7f8c8d; font-size:0.85rem; margin-bottom:24px;"
                        th:text="${tutor.totalCalificaciones} + ' reseñas'"></p>

                    <!-- Info rápida -->
                    <div
                        style="background:#f8f9fa; border-radius:12px; padding:16px; text-align:left; margin-bottom:24px;">
                        <div
                            style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                            <span style="color:#7f8c8d; font-size:0.88rem;">Precio / hora</span>
                            <span style="font-weight:700; color:var(--rojo);"
                                th:text="'$' + (${tutor.precioPorHora} ?: '0')"></span>
                        </div>
                        <div
                            style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
                            <span style="color:#7f8c8d; font-size:0.88rem;">Experiencia</span>
                            <span style="font-weight:600; color:var(--texto);"
                                th:text="(${tutor.aniosExperiencia} ?: '0') + ' años'"></span>
                        </div>
                        <div style="display:flex; justify-content:space-between; padding:8px 0;">
                            <span style="color:#7f8c8d; font-size:0.88rem;">Disponibilidad</span>
                            <span style="color:#1e8449; font-weight:600; font-size:0.88rem;">
                                <i class="bi bi-circle-fill" style="font-size:0.5rem; margin-right:4px;"></i>Disponible
                            </span>
                        </div>
                    </div>

                    <a th:href="@{/estudiante/agendar/{id}(id=${tutor.id})}"
                        class="btn-primario w-100 justify-content-center">
                        <i class="bi bi-calendar-plus"></i>Agendar tutoría
                    </a>
                </div>
            </div>

            <!-- Columna derecha: detalles -->
            <div class="col-md-7">

                <!-- Sobre el tutor -->
                <div class="card-institucional mb-4">
                    <div class="card-header-azul">
                        <i class="bi bi-person-lines-fill me-2"></i>Sobre el tutor
                    </div>
                    <div class="p-4">
                        <p style="color:var(--texto); line-height:1.7; margin:0;"
                            th:text="${tutor.descripcion ?: 'Este tutor aún no ha agregado una descripción.'}"></p>
                    </div>
                </div>

                <!-- Especialidades -->
                <div class="card-institucional mb-4"
                    th:if="${tutor.materias != null and not #lists.isEmpty(tutor.materias)}">
                    <div class="card-header-azul">
                        <i class="bi bi-book me-2"></i>Materias que enseña
                    </div>
                    <div class="p-4" style="display:flex; flex-wrap:wrap; gap:10px;">
                        <span th:each="m : ${tutor.materias}" style="background:rgba(26,58,92,0.08); color:var(--azul);
                                 padding:6px 14px; border-radius:20px; font-size:0.88rem; font-weight:600;"
                            th:text="${m}"></span>
                    </div>
                </div>

                <!-- Estadísticas -->
                <div class="card-institucional">
                    <div class="card-header-azul">
                        <i class="bi bi-bar-chart me-2"></i>Estadísticas
                    </div>
                    <div class="p-4">
                        <div class="row g-3 text-center">
                            <div class="col-4">
                                <h3 style="color:var(--azul); font-weight:700; margin-bottom:4px;"
                                    th:text="${tutor.totalCalificaciones}">0</h3>
                                <p style="color:#7f8c8d; font-size:0.82rem; margin:0;">Reseñas</p>
                            </div>
                            <div class="col-4">
                                <h3 style="color:var(--azul); font-weight:700; margin-bottom:4px;"
                                    th:text="${tutor.aniosExperiencia ?: '0'}">0</h3>
                                <p style="color:#7f8c8d; font-size:0.82rem; margin:0;">Años exp.</p>
                            </div>
                            <div class="col-4">
                                <h3 style="color:var(--azul); font-weight:700; margin-bottom:4px;">4.5</h3>
                                <p style="color:#7f8c8d; font-size:0.82rem; margin:0;">Rating</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Tutores relacionados -->
        <div class="row mt-5" th:unless="${#lists.isEmpty(relacionados)}">
            <div class="col-12 mb-3">
                <h4 style="font-family:'Merriweather',serif; color:var(--azul); font-size:1.1rem;">
                    Otros tutores que podrían interesarte
                </h4>
            </div>
            <div class="col-md-4" th:each="r : ${relacionados}">
                <div class="tutor-card h-100">
                    <div class="tutor-header">
                        <div class="avatar-iniciales" data-avatar th:attr="data-avatar=${r.nombre}"
                            style="width:56px;height:56px;font-size:1.2rem;margin:0 auto 10px;border:2px solid rgba(255,255,255,0.3);">
                        </div>
                        <div class="tutor-nombre" th:text="${r.nombre}"></div>
                        <div class="tutor-especialidad" th:text="${r.especialidad ?: 'Tutor'}"></div>
                    </div>
                    <div class="tutor-body">
                        <div class="tutor-precio">
                            $<span th:text="${r.precioPorHora != null ? r.precioPorHora : '0'}"></span>
                            <span>/ hora</span>
                        </div>
                        <p class="tutor-desc" th:text="${r.descripcion ?: 'Tutor disponible.'}"></p>
                    </div>
                    <div class="tutor-footer" style="display:flex; gap:8px;">
                        <a th:href="@{/estudiante/tutor/{id}(id=${r.id})}" class="btn-secundario"
                            style="flex:1; justify-content:center; padding:8px; font-size:0.88rem;">
                            Ver perfil
                        </a>
                        <a th:href="@{/estudiante/agendar/{id}(id=${r.id})}" class="btn-primario"
                            style="flex:1; justify-content:center; padding:8px; font-size:0.88rem;">
                            <i class="bi bi-calendar-plus"></i>Agendar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <script>
(function () {
  /* Dropdown de perfil */
  const btn  = document.getElementById('profileBtn');
  const drop = document.getElementById('profileDropdown');
  if (btn && drop) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      const open = drop.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function () {
      drop.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });
    drop.addEventListener('click', function (e) { e.stopPropagation(); });
  }

  /* Marcar link activo según URL actual */
  const path = window.location.pathname;
  document.querySelectorAll('.nav-link').forEach(function (a) {
    if (a.getAttribute('href') === path) a.classList.add('active');
  });

  /* Color de avatar por inicial */
  const paleta = ['#1A6FA5','#1E8449','#D35400','#7D3C98','#C0392B','#117A65'];
  document.querySelectorAll('.profile-avatar').forEach(function (av) {
    const letra = av.textContent.trim() || 'U';
    av.style.background = paleta[letra.charCodeAt(0) % paleta.length];
  });
})();
</script>
</body>

</html>
