<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones — Agenda Tutorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar-institucional">
    <div class="logo">
        <img th:src="@{/img/logo.png}" alt="Comfenalco" onerror="this.style.display='none'">
    </div>
    <div class="nav-links">
        <a th:href="@{/estudiante/dashboard}" class="btn-nav-outline">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
        <a th:href="@{/logout}" class="btn-nav-danger">
            <i class="bi bi-box-arrow-right me-1"></i>Salir
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 style="font-family:'Merriweather',serif; color:var(--azul); font-size:1.4rem; margin:0;">
                    <i class="bi bi-bell me-2"></i>Notificaciones
                </h2>
                <span style="color:#7f8c8d; font-size:0.88rem;"
                      th:text="${notificaciones.size()} + ' en total'"></span>
            </div>

            <div th:if="${#lists.isEmpty(notificaciones)}" class="empty-state"
                 style="background:white; border-radius:14px; box-shadow:var(--sombra);">
                <i class="bi bi-bell-slash"></i>
                <p>No tienes notificaciones aún</p>
            </div>

            <div class="card-institucional" th:unless="${#lists.isEmpty(notificaciones)}">
                <div th:each="n : ${notificaciones}"
                     th:classappend="${!n.leida ? 'no-leida' : ''}"
                     class="notif-item">
                    <div class="notif-icono"
                         th:classappend="${n.tipo.name().contains('ACEPTADA') or n.tipo.name().contains('APROBADA') or n.tipo.name().contains('PAGADA') ? 'verde' :
                                          n.tipo.name().contains('RECHAZADA') or n.tipo.name().contains('NO_ASISTIO') ? 'rojo' :
                                          n.tipo.name().contains('AGENDADA') or n.tipo.name().contains('EN_CURSO') or n.tipo.name().contains('EN_REVISION') ? 'naranja' :
                                          n.tipo.name().contains('EXPIRADA') or n.tipo.name().contains('FINALIZADA') ? 'azul' : 'azul'}">
                        <i th:class="${n.tipo.name().contains('ACEPTADA') or n.tipo.name().contains('APROBADA') or n.tipo.name().contains('PAGADA') ? 'bi bi-check-circle-fill' :
                                       n.tipo.name().contains('RECHAZADA') or n.tipo.name().contains('NO_ASISTIO') ? 'bi bi-x-circle-fill' :
                                       n.tipo.name().contains('AGENDADA') or n.tipo.name().contains('EN_CURSO') or n.tipo.name().contains('EN_REVISION') ? 'bi bi-calendar-plus-fill' :
                                       n.tipo.name().contains('EXPIRADA') or n.tipo.name().contains('FINALIZADA') ? 'bi bi-clock-fill' : 'bi bi-bell-fill'}"></i>
                    </div>
                    <div class="notif-texto" style="flex:1;">
                        <p style="font-weight:600;" th:text="${n.titulo}"></p>
                        <p th:text="${n.mensaje}"></p>
                        <small th:text="${#temporals.format(n.fecha, 'dd/MM/yyyy HH:mm')}"></small>
                    </div>
                    <div th:unless="${n.leida}"
                         style="width:8px; height:8px; border-radius:50%; background:var(--rojo); flex-shrink:0; margin-top:6px;"></div>
                </div>
                <!-- Paginación -->
                <div th:if="${totalPages > 1}" class="d-flex justify-content-center gap-2 p-3">
                    <a th:if="${currentPage > 0}"
                       th:href="@{/notificaciones(page=${currentPage - 1})}"
                       class="btn-primario" style="padding:6px 16px;font-size:0.82rem;">
                        <i class="bi bi-chevron-left"></i> Anterior
                    </a>
                    <span style="font-size:0.85rem;color:#7f8c8d;">
                        Página <strong style="color:var(--azul);" th:text="${currentPage + 1}"></strong>
                        de <strong th:text="${totalPages}"></strong>
                    </span>
                    <a th:if="${currentPage < totalPages - 1}"
                       th:href="@{/notificaciones(page=${currentPage + 1})}"
                       class="btn-primario" style="padding:6px 16px;font-size:0.82rem;">
                        Siguiente <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
