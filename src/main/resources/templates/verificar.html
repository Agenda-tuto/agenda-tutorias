<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar cuenta — Agenda Tutorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body style="display:flex; align-items:center; justify-content:center;
             min-height:100vh; background:var(--gris-claro);">

<div style="width:100%; max-width:440px; padding:24px;">

    <div style="text-align:center; margin-bottom:28px;">
        <div style="width:80px; height:80px; border-radius:50%;
                    background:rgba(26,58,92,0.1);
                    display:flex; align-items:center; justify-content:center;
                    font-size:2rem; color:var(--azul); margin:0 auto 16px;">
            <i class="bi bi-envelope-check"></i>
        </div>
        <h2 style="font-family:'Merriweather',serif; color:var(--azul); margin-bottom:8px;">
            Revisa tu correo
        </h2>
        <p style="color:#7f8c8d; font-size:0.95rem;">
            Te enviamos un código de 6 dígitos a
        </p>
        <p style="color:var(--azul); font-weight:700; font-size:1rem;"
           th:text="${correo}"></p>
    </div>

    <div th:if="${error}" class="alerta alerta-error mb-3">
        <i class="bi bi-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <div class="card-institucional">
        <div class="p-4">
            <form th:action="@{/verificar}" method="post">
                <input type="hidden" name="correo" th:value="${correo}">
                <div class="mb-4">
                    <label class="form-label">Código de verificación</label>
                    <input type="text" name="codigo" class="form-control"
                           placeholder="000000" maxlength="6"
                           style="font-size:1.5rem; letter-spacing:8px;
                                  text-align:center; font-weight:700;"
                           required autofocus>
                    <p style="color:#7f8c8d; font-size:0.82rem; margin-top:8px;">
                        Revisa también la carpeta de spam si no lo encuentras.
                    </p>
                </div>
                <button type="submit" class="btn-primario w-100 justify-content-center">
                    <i class="bi bi-check-circle"></i>Verificar y activar cuenta
                </button>
            </form>

            <div style="margin-top:16px; text-align:center;">
                <a th:href="@{/registro}"
                   style="color:#7f8c8d; font-size:0.88rem; text-decoration:none;">
                    <i class="bi bi-arrow-left me-1"></i>Volver al registro
                </a>
            </div>
        </div>
    </div>

    <div style="margin-top:16px; background:rgba(30,132,73,0.08);
                border-radius:12px; padding:14px 18px;
                display:flex; align-items:center; gap:12px;">
        <i class="bi bi-wallet2" style="color:#1e8449; font-size:1.2rem;"></i>
        <div>
            <p style="margin:0; font-size:0.88rem; font-weight:700; color:#1e8449;">
                ¡Bono de bienvenida!
            </p>
            <p style="margin:0; font-size:0.82rem; color:#7f8c8d;">
                Al verificar recibirás $50.000 en tu billetera
            </p>
        </div>
    </div>

</div>
</body>
</html>
